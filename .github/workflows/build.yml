name: Build Driver Package and Control Panel

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Driver Package and Control Panel
    permissions:
      contents: write
    runs-on: windows-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        #with:
        #  repository: vitoplantamura/MagicTrackpad2ForWindows
        #  ref: master

      - name: Create Source Tarball
        shell: bash
        id: create_tarball
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          mkdir .tarball
          tar -czf .tarball/source-${COMMIT_SHA}.tar.gz --exclude='.git' --exclude='.tarball' .

      - name: Upload Source Tarball
        uses: actions/upload-artifact@v4
        with:
          name: source-code-${{ steps.create_tarball.outputs.commit_sha }}
          path: .tarball/source-${{ steps.create_tarball.outputs.commit_sha }}.tar.gz

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet Packages
        run: |
          nuget restore ./AmtPtpDeviceUsbUm/MagicTrackpad2PtpDevice.vcxproj -PackagesDirectory ${{ github.workspace }}\packages
          nuget restore ./AmtPtpHidFilter/AmtPtpHidFilter.vcxproj -PackagesDirectory ${{ github.workspace }}\packages
          
      - name: Build
        shell: bash
        run: |
          sed -i 's|</TimeStampServer>|</TimeStampServer><ApiValidator_Enable>false</ApiValidator_Enable>|g' ./AmtPtpDeviceUsbUm/MagicTrackpad2PtpDevice.vcxproj
          sed -i 's|</TimeStampServer>|</TimeStampServer><ApiValidator_Enable>false</ApiValidator_Enable>|g' ./AmtPtpHidFilter/AmtPtpHidFilter.vcxproj
          msbuild.exe ./AmtPtpDeviceUsbUm/MagicTrackpad2PtpDevice.vcxproj -p:Configuration=Release -p:Platform=x64
          msbuild.exe ./AmtPtpHidFilter/AmtPtpHidFilter.vcxproj -p:Configuration=Release -p:Platform=x64
          msbuild.exe ./AmtPtpDeviceUsbUm/MagicTrackpad2PtpDevice.vcxproj -p:Configuration=Release -p:Platform=ARM64
          msbuild.exe ./AmtPtpHidFilter/AmtPtpHidFilter.vcxproj -p:Configuration=Release -p:Platform=ARM64
          msbuild.exe ./AmtPtpControlPanel/AmtPtpControlPanel.csproj -p:Configuration=Release -p:Platform=AnyCPU
          mkdir package_x64 package_arm64
          cp build/AmtPtpDevice_AMD64.inf package_x64/AmtPtpDevice.inf
          cp AmtPtpDeviceUsbUm/build/AmtPtpDeviceUsbUm/x64/Release/AmtPtpDeviceUsbUm.dll package_x64/
          cp AmtPtpHidFilter/build/AmtPtpHidFilter/x64/Release/AmtPtpHidFilter.sys package_x64/
          cp build/AmtPtpDevice_ARM64.inf package_arm64/AmtPtpDevice.inf
          cp AmtPtpDeviceUsbUm/build/AmtPtpDeviceUsbUm/ARM64/Release/AmtPtpDeviceUsbUm.dll package_arm64/
          cp AmtPtpHidFilter/build/AmtPtpHidFilter/ARM64/Release/AmtPtpHidFilter.sys package_arm64/
          INF2CAT="$(find packages "/c/Program Files (x86)/Windows Kits/10/bin" -iname Inf2Cat.exe | sort | tail -n 1)"
          SIGNTOOL="$(find packages "/c/Program Files (x86)/Windows Kits/10/bin" -iname signtool.exe | sort | tail -n 1)"
          if [ -z "$INF2CAT" ]; then echo "Inf2Cat.exe not found"; exit 1; fi
          if [ -z "$SIGNTOOL" ]; then echo "signtool.exe not found"; exit 1; fi
          export MSYS2_ARG_CONV_EXCL='*'
          "$INF2CAT" /driver:"$(cygpath -w package_x64)" /os:10_RS4_X64
          "$INF2CAT" /driver:"$(cygpath -w package_arm64)" /os:10_RS4_ARM64
          "$SIGNTOOL" sign /fd SHA256 /a "$(cygpath -w package_x64/AmtPtpDevice.cat)"
          "$SIGNTOOL" sign /fd SHA256 /a "$(cygpath -w package_arm64/AmtPtpDevice.cat)"
          echo -e '.OPTION EXPLICIT\n.Set CabinetFileCountThreshold=0\n.Set FolderFileCountThreshold=0\n.Set FolderSizeThreshold=0\n.Set MaxCabinetSize=0\n.Set MaxDiskFileCount=0\n.Set MaxDiskSize=0\n.Set CompressionType=MSZIP\n.Set Cabinet=on\n.Set Compress=on\n.Set CabinetNameTemplate=drivers_x64.cab\n.Set DestinationDir=AMD64\npackage_x64\\AmtPtpDevice.inf\tAmtPtpDevice.inf\npackage_x64\\AmtPtpDevice.cat\npackage_x64\\AmtPtpDeviceUsbUm.dll\npackage_x64\\AmtPtpHidFilter.sys\nAmtPtpDeviceUsbUm\\build\\AmtPtpDeviceUsbUm\\x64\\Release\\AmtPtpDeviceUsbUm.pdb\nAmtPtpHidFilter\\build\\AmtPtpHidFilter\\x64\\Release\\AmtPtpHidFilter.pdb\n' > x64.ddf
          echo -e '.OPTION EXPLICIT\n.Set CabinetFileCountThreshold=0\n.Set FolderFileCountThreshold=0\n.Set FolderSizeThreshold=0\n.Set MaxCabinetSize=0\n.Set MaxDiskFileCount=0\n.Set MaxDiskSize=0\n.Set CompressionType=MSZIP\n.Set Cabinet=on\n.Set Compress=on\n.Set CabinetNameTemplate=drivers_arm64.cab\n.Set DestinationDir=ARM64\npackage_arm64\\AmtPtpDevice.inf\tAmtPtpDevice.inf\npackage_arm64\\AmtPtpDevice.cat\npackage_arm64\\AmtPtpDeviceUsbUm.dll\npackage_arm64\\AmtPtpHidFilter.sys\nAmtPtpDeviceUsbUm\\build\\AmtPtpDeviceUsbUm\\ARM64\\Release\\AmtPtpDeviceUsbUm.pdb\nAmtPtpHidFilter\\build\\AmtPtpHidFilter\\ARM64\\Release\\AmtPtpHidFilter.pdb\n' > arm64.ddf
          makecab -f x64.ddf && makecab -f arm64.ddf
          mkdir result
          cp AmtPtpControlPanel/bin/Release/AmtPtpControlPanel.exe result/
          mv disk1/*.cab result/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result/
